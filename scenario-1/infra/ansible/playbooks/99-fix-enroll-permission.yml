---
- name: Fix VulnUserAuth template Enroll permissions
  hosts: dc
  gather_facts: no
  vars:
    domain_user: "SERINI\\Administrator"
    domain_password: "P@ssw0rd123!"
    ansible_become_password: "{{ domain_password }}"
  become: yes
  become_method: runas
  become_user: "{{ domain_user }}"

  tasks:
    - name: Upload Enroll permission fix script
      ansible.windows.win_copy:
        content: |
          Import-Module ActiveDirectory
          $configNC = (Get-ADRootDSE).configurationNamingContext
          $templateDn = "CN=VulnUserAuth,CN=Certificate Templates,CN=Public Key Services,CN=Services,$configNC"
          $acl = Get-Acl -Path "AD:$templateDn"
          $domainUsers = New-Object System.Security.Principal.NTAccount("SERINI", "Domain Users")
          $enrollGuid = [Guid]"0e10c968-78fb-11d2-90d4-00c04f79dc55"
          $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($domainUsers, "ExtendedRight", "Allow", $enrollGuid)
          $acl.AddAccessRule($rule)
          Set-Acl -Path "AD:$templateDn" -AclObject $acl
          Write-Host "Enroll permission added"
          Get-Acl -Path "AD:$templateDn" | Select-Object -ExpandProperty Access | Where-Object { $_.IdentityReference -like "*Domain Users*" }
        dest: C:\Windows\Temp\fix-enroll.ps1

    - name: Execute permission fix script
      ansible.windows.win_shell: powershell.exe -ExecutionPolicy Bypass -File C:\Windows\Temp\fix-enroll.ps1
      args:
        executable: powershell.exe
