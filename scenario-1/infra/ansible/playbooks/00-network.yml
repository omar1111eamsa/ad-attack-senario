---
# Network verification for Libvirt
# Libvirt automatically configures static IPs, we just verify and set DNS

- name: Verify network configuration on Windows hosts
  hosts: windows
  gather_facts: no
  tasks:
    - name: Wait for WinRM to be available
      ansible.builtin.wait_for_connection:
        timeout: 600
        delay: 10

    - name: Verify correct IP address is assigned
      ansible.windows.win_shell: |
        $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.IPAddress -eq "{{ ansible_host }}"})
        if (-not $ip) {
          throw "Expected IP {{ ansible_host }} not found"
        }
        Write-Host "IP verified: {{ ansible_host }}"
      register: ip_check

    # Each VM is dual-homed: a libvirt management NIC (192.168.121.x) and the
    # lab NIC ({{ lab_network }}.x). Windows must use the LAB NIC for all domain
    # traffic, otherwise DNS/Kerberos go out the management NIC and domain join,
    # secure-channel and runas all fail intermittently. Make the lab NIC the
    # preferred interface and put the DC's DNS only on it.
    - name: Prefer the lab NIC and point DNS at the DC
      ansible.windows.win_shell: |
        $lab  = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -like "{{ lab_network }}.*" }).InterfaceIndex
        $mgmt = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -like "192.168.121.*" }).InterfaceIndex
        if ($lab)  { Set-NetIPInterface -InterfaceIndex $lab  -InterfaceMetric 1    -ErrorAction SilentlyContinue
                     Set-DnsClientServerAddress -InterfaceIndex $lab  -ServerAddresses "{{ dc_ip }}" -ErrorAction SilentlyContinue }
        if ($mgmt) { Set-NetIPInterface -InterfaceIndex $mgmt -InterfaceMetric 9999 -ErrorAction SilentlyContinue
                     Set-DnsClientServerAddress -InterfaceIndex $mgmt -ResetServerAddresses -ErrorAction SilentlyContinue }
        Clear-DnsClientCache
        Write-Host "lab=$lab mgmt=$mgmt dns={{ dc_ip }}"
      args:
        executable: powershell.exe
      changed_when: false
