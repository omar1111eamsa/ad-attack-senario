---
- name: Configure static IPs on Windows hosts
  hosts: windows
  gather_facts: no
  vars:
    dc_ip: 192.168.58.10
  tasks:
    - name: Set static IP on primary adapter
      ansible.windows.win_shell: |
        $if = Get-NetAdapter | Where-Object { $_.Status -eq "Up" } | Select-Object -Last 1
        if (-not $if) { throw "No active adapter found" }
        $desired = "{{ ansible_host }}"
        $current = (Get-NetIPAddress -InterfaceAlias $if.Name -AddressFamily IPv4 -ErrorAction SilentlyContinue | Where-Object { $_.IPAddress -ne "127.0.0.1" } | Select-Object -First 1).IPAddress
        $hasDesired = Get-NetIPAddress -AddressFamily IPv4 -ErrorAction SilentlyContinue | Where-Object { $_.IPAddress -eq $desired }
        if ($hasDesired) { return }
        if ($current -and $current -ne $desired) {
          Get-NetIPAddress -InterfaceAlias $if.Name -AddressFamily IPv4 -ErrorAction SilentlyContinue | Remove-NetIPAddress -Confirm:$false
        }
        try {
          New-NetIPAddress -InterfaceAlias $if.Name -IPAddress $desired -PrefixLength 24 -ErrorAction Stop
        } catch {
          if ($_.Exception.Message -notmatch 'already exists') { throw }
        }

    - name: Set DNS to DC
      ansible.windows.win_dns_client:
        adapter_names: "*"
        ipv4_addresses:
          - "{{ dc_ip }}"
