---
# Network verification for Libvirt
# Libvirt automatically configures static IPs, we just verify and set DNS

- name: Verify network configuration on Windows hosts
  hosts: windows
  gather_facts: no
  tasks:
    - name: Wait for WinRM to be available
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10

    - name: Verify correct IP address is assigned
      ansible.windows.win_shell: |
        $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.IPAddress -eq "{{ ansible_host }}"})
        if (-not $ip) {
          throw "Expected IP {{ ansible_host }} not found"
        }
        Write-Host "IP verified: {{ ansible_host }}"
      register: ip_check

    - name: Configure DNS to point to DC
      ansible.windows.win_dns_client:
        adapter_names: "*"
        ipv4_addresses:
          - "{{ dc_ip }}"
