---
- name: Install Kali attack tooling
  hosts: attacker
  gather_facts: no
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - libssl-dev
          - libffi-dev
          - build-essential
          - crackmapexec
          - impacket-scripts
          - pipx
        state: present

    - name: Install Certipy with pipx
      ansible.builtin.command: pipx install certipy-ad
      become_user: vagrant
      environment:
        PIPX_HOME: /home/vagrant/.local/pipx
        PIPX_BIN_DIR: /home/vagrant/.local/bin
      args:
        creates: /home/vagrant/.local/bin/certipy

    - name: Verify Certipy
      ansible.builtin.command: /home/vagrant/.local/bin/certipy --version
      changed_when: false

    - name: Verify Impacket
      ansible.builtin.command: /usr/bin/impacket-getTGT -h
      changed_when: false

    - name: Verify CrackMapExec
      ansible.builtin.command: crackmapexec -h
      changed_when: false

    - name: Ensure user PATH includes ~/.local/bin
      ansible.builtin.lineinfile:
        path: /home/vagrant/.profile
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true

    - name: Add domain hosts for Certipy (dc, ca, serini.lab)
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item.line }}"
        create: true
      loop:
        - { line: "192.168.58.10  dc.serini.lab dc serini.lab" }
        - { line: "192.168.58.20  ca.serini.lab ca" }
      loop_control:
        label: "{{ item.line }}"
