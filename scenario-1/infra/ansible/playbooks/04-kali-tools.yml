---
- name: Install Kali attack tooling
  hosts: attacker
  gather_facts: no
  become: true
  tasks:
    # apt against the Kali mirror can be unavailable on restricted networks; the
    # core attack only needs certipy (installed from PyPI via pipx below) and
    # impacket (preinstalled on Kali), so apt steps are best-effort, not fatal.
    - name: Update apt cache (best-effort)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      failed_when: false

    - name: Install extra tooling (best-effort)
      ansible.builtin.apt:
        name:
          - pipx
          - netexec          # modern replacement for the removed crackmapexec
          - impacket-scripts
          - libssl-dev
          - libffi-dev
        state: present
      failed_when: false

    - name: Ensure pipx is available (fallback via pip if apt was blocked)
      ansible.builtin.shell: command -v pipx || python3 -m pip install --user --break-system-packages pipx
      changed_when: false

    - name: Install Certipy with pipx (from PyPI)
      ansible.builtin.command: pipx install certipy-ad
      become_user: vagrant
      environment:
        PIPX_HOME: /home/vagrant/.local/pipx
        PIPX_BIN_DIR: /home/vagrant/.local/bin
      args:
        creates: /home/vagrant/.local/bin/certipy

    - name: Verify Certipy (required)
      ansible.builtin.command: /home/vagrant/.local/bin/certipy --version
      changed_when: false

    - name: Verify Impacket (required; preinstalled on Kali)
      ansible.builtin.command: impacket-getTGT -h
      changed_when: false

    - name: Verify NetExec (optional)
      ansible.builtin.command: netexec --version
      changed_when: false
      failed_when: false

    - name: Ensure user PATH includes ~/.local/bin
      ansible.builtin.lineinfile:
        path: /home/vagrant/.profile
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true

    - name: Add domain hosts for Certipy (dc, ca, serini.lab)
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item.line }}"
        create: true
      loop:
        - { line: "{{ dc_ip }}  dc.{{ domain_name }} dc {{ domain_name }}" }
        - { line: "{{ ca_ip }}  ca.{{ domain_name }} ca" }
      loop_control:
        label: "{{ item.line }}"
