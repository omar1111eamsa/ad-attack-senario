---
- name: Install AD CS on CA
  hosts: ca
  gather_facts: no
  vars:
    # Use domain admin for AD CS deployment
    ansible_user: "SERINI\\Administrator"
    ansible_password: "P@ssw0rd123!"
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: yes
    ansible_become_method: runas
    ansible_become_user: "SERINI\\Administrator"
    ansible_become_password: "P@ssw0rd123!"

    ca_common_name: "SERINI-CA"
  tasks:
    - name: Install AD CS role
      ansible.windows.win_feature:
        name: ADCS-Cert-Authority
        state: present
        include_management_tools: true
      register: adcs_role

    - name: Reboot if AD CS role requires it
      ansible.windows.win_reboot:
      when: adcs_role.reboot_required | default(false)

    - name: Configure Enterprise Root CA
      ansible.windows.win_shell: |
        Install-AdcsCertificationAuthority `
          -CAType EnterpriseRootCA `
          -CACommonName "{{ ca_common_name }}" `
          -CryptoProviderName 'RSA#Microsoft Software Key Storage Provider' `
          -KeyLength 2048 `
          -HashAlgorithmName SHA256 `
          -ValidityPeriod Years `
          -ValidityPeriodUnits 5 `
          -Force
      args:
        executable: powershell.exe
      register: ca_config
      failed_when: "'already installed' not in ca_config.stderr"

    - name: Configure CA Firewall Rules
      ansible.windows.win_shell: |
        New-NetFirewallRule -DisplayName "HTTP" -Direction Inbound -Protocol TCP -LocalPort 80 -Action Allow -ErrorAction SilentlyContinue
        New-NetFirewallRule -DisplayName "HTTPS" -Direction Inbound -Protocol TCP -LocalPort 443 -Action Allow -ErrorAction SilentlyContinue
        New-NetFirewallRule -DisplayName "RPC" -Direction Inbound -Protocol TCP -LocalPort 135 -Action Allow -ErrorAction SilentlyContinue
        New-NetFirewallRule -DisplayName "SMB" -Direction Inbound -Protocol TCP -LocalPort 445 -Action Allow -ErrorAction SilentlyContinue
      args:
        executable: powershell.exe

    - name: Reboot after AD CS install
      ansible.windows.win_reboot:
