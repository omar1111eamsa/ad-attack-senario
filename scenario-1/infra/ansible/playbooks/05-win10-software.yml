---
- name: Install user software on Win10
  hosts: win10
  gather_facts: no
  vars:
    ansible_user: "vagrant"
    ansible_password: "vagrant"
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: yes
    ansible_become_method: runas
    ansible_become_user: "SERINI\\Administrator"
    ansible_become_password: "P@ssw0rd123!"
  tasks:
    - name: Check for Chocolatey
      ansible.windows.win_stat:
        path: C:\ProgramData\chocolatey\bin\choco.exe
      register: choco_stat

    - name: Download Chocolatey install script
      ansible.windows.win_get_url:
        url: https://community.chocolatey.org/install.ps1
        dest: C:\Windows\Temp\choco.ps1
      when: not choco_stat.stat.exists

    - name: Install Chocolatey
      ansible.windows.win_shell: |
        powershell.exe -ExecutionPolicy Bypass -File C:\Windows\Temp\choco.ps1
      when: not choco_stat.stat.exists

    - name: Install Chrome
      ansible.windows.win_shell: |
        & "$env:ProgramData\chocolatey\bin\choco.exe" install googlechrome -y

    - name: Check for Acrobat
      ansible.windows.win_shell: |
        $reader = Test-Path "C:\Program Files (x86)\Adobe\Acrobat Reader DC\Reader\AcroRd32.exe"
        $acrobat = Test-Path "C:\Program Files\Adobe\Acrobat DC\Acrobat\Acrobat.exe"
        if ($reader -or $acrobat) { "FOUND=true" } else { "FOUND=false" }
      register: acrobat_check
      changed_when: false

    - name: Download Acrobat Reader offline installer (fallback)
      ansible.windows.win_get_url:
        url: https://ardownload2.adobe.com/pub/adobe/acrobat/win/AcrobatDC/2500120577/AcroRdrDCx642500120577_MUI.exe
        dest: C:\Windows\Temp\AcroRdrDCx64_2500120577.exe
      when: acrobat_check.stdout is search("FOUND=false")

    - name: Install Acrobat Reader offline installer
      ansible.windows.win_shell: |
        & "C:\Windows\Temp\AcroRdrDCx64_2500120577.exe" /sAll /msi /norestart /quiet EULA_ACCEPT=YES DISABLEDESKTOPSHORTCUT=1 DISABLE_ARM_SERVICE_INSTALL=1 UPDATE_MODE=0
      when: acrobat_check.stdout is search("FOUND=false")

    # --- Training artifact: benign PDF on Desktop + click/open telemetry (no payload) ---
    - name: Ensure Public Desktop exists
      ansible.windows.win_file:
        path: C:\Users\Public\Desktop
        state: directory

    - name: Place training PDF on desktop (Invoice.pdf)
      ansible.windows.win_get_url:
        url: https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf
        dest: C:\Users\Public\Desktop\Invoice.pdf
        force: no

    - name: Enable Security auditing for File System access (Success)
      ansible.windows.win_shell: |
        auditpol.exe /set /subcategory:"File System" /success:enable
      changed_when: false

    - name: Enable Security auditing for Handle Manipulation (Success)
      ansible.windows.win_shell: |
        auditpol.exe /set /subcategory:"Handle Manipulation" /success:enable
      changed_when: false

    - name: Set SACL on Invoice.pdf to log read/open access
      ansible.windows.win_shell: |
        $p = "C:\Users\Public\Desktop\Invoice.pdf"
        if (!(Test-Path $p)) { throw "Missing $p" }
        
        $acl = Get-Acl $p -Audit
        # Audit: Everyone, ReadAndExecute, Success
        $auditRule = New-Object System.Security.AccessControl.FileSystemAuditRule("Everyone", "ReadAndExecute", "Success")
        $acl.SetAuditRule($auditRule)
        Set-Acl $p $acl
      changed_when: false

    - name: Drop helper script to check whether Invoice.pdf was opened
      ansible.windows.win_copy:
        dest: C:\Users\Public\Desktop\Check-InvoiceClick.ps1
        content: |
          $ErrorActionPreference = "Stop"
          $path = "C:\Users\Public\Desktop\Invoice.pdf"
          if (!(Test-Path $path)) { throw "Missing $path" }

          Write-Host "Checking Security log for file access events on: $path"
          Write-Host "Tip: open Invoice.pdf first, then re-run this script."

          $since = (Get-Date).AddHours(-24)
          $events = Get-WinEvent -FilterHashtable @{ LogName='Security'; Id=4663; StartTime=$since } -ErrorAction SilentlyContinue
          if (-not $events) {
            Write-Host "No 4663 events found in last 24h (auditing may be disabled or log cleared)." -ForegroundColor Yellow
            exit 2
          }

          $match = $events | Where-Object { $_.Message -like "*$path*" } | Select-Object -First 1
          if ($match) {
            Write-Host "FOUND: Invoice.pdf was accessed/opened." -ForegroundColor Green
            Write-Host ("TimeCreated: {0}" -f $match.TimeCreated)
            exit 0
          } else {
            Write-Host "NOT FOUND: No access events for Invoice.pdf yet." -ForegroundColor Yellow
            exit 1
          }

    # --- Provisioning validations ("tests") ---
    - name: Stat Invoice.pdf
      ansible.windows.win_stat:
        path: C:\Users\Public\Desktop\Invoice.pdf
      register: invoice_pdf

    - name: Stat Check-InvoiceClick.ps1
      ansible.windows.win_stat:
        path: C:\Users\Public\Desktop\Check-InvoiceClick.ps1
      register: invoice_checker

    - name: Assert training desktop artifacts exist
      ansible.builtin.assert:
        that:
          - invoice_pdf.stat.exists
          - invoice_checker.stat.exists
        fail_msg: "Training artifacts missing on Win10 desktop (expected Invoice.pdf + Check-InvoiceClick.ps1)."

    - name: Verify audit subcategories are enabled
      ansible.windows.win_shell: |
        auditpol.exe /get /subcategory:"File System"
        auditpol.exe /get /subcategory:"Handle Manipulation"
      register: auditpol_get
      changed_when: false

    - name: Assert auditing is enabled (Success)
      ansible.builtin.assert:
        that:
          - auditpol_get.stdout is search("File System")
          - auditpol_get.stdout is search("Success")
          - auditpol_get.stdout is search("Handle Manipulation")
        fail_msg: "Expected Windows auditing to be enabled for File System + Handle Manipulation (Success)."

    - name: Verify SACL exists on Invoice.pdf
      ansible.windows.win_shell: |
        icacls.exe "C:\Users\Public\Desktop\Invoice.pdf"
      register: icacls_invoice
      changed_when: false

    - name: Assert Invoice.pdf has an audit entry
      ansible.builtin.assert:
        that:
          # icacls prints an audit section when SACL is present; text varies but includes "AUDIT" in many builds.
          - icacls_invoice.stdout is search("Audit", ignorecase=True) or icacls_invoice.stdout is search("S:", ignorecase=True)
        fail_msg: "Invoice.pdf does not appear to have a SACL/audit entry (icacls output did not indicate auditing)."
