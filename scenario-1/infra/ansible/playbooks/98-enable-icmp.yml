- name: Enable ICMP (Ping) on Windows hosts
  hosts: windows
  gather_facts: no
  become: yes
  become_method: runas
  become_user: System
  tasks:
    - name: Allow ICMPv4-In Firewall Rule
      ansible.windows.win_shell: |
        if (-not (Get-NetFirewallRule -DisplayName "Allow ICMPv4-In" -ErrorAction SilentlyContinue)) {
          New-NetFirewallRule -DisplayName "Allow ICMPv4-In" -Protocol ICMPv4 -IcmpType 8 -Enabled True -Profile Any -Action Allow | Out-Null
          Write-Host "CREATED"
        }
      register: icmp_rule
      changed_when: "'CREATED' in icmp_rule.stdout"
