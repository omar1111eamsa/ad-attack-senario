---
- name: Create ESC1 vulnerable template in AD
  hosts: dc
  gather_facts: no
  become: yes
  become_method: runas
  become_user: "{{ domain_user }}"
  tasks:
    - name: Upload template script
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/../../../scripts/01-create-vulnerable-template.ps1"
        dest: C:\Windows\Temp\01-create-vulnerable-template.ps1

    - name: Create vulnerable template in AD
      ansible.windows.win_shell: |
        powershell.exe -ExecutionPolicy Bypass -File C:\Windows\Temp\01-create-vulnerable-template.ps1

    - name: Publish template on CA in AD
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory
        $configNC = (Get-ADRootDSE).configurationNamingContext
        $enrollPath = "CN=Enrollment Services,CN=Public Key Services,CN=Services,$configNC"
        $ca = Get-ADObject -SearchBase $enrollPath -LDAPFilter "(cn=SERINI-CA)" -Properties certificateTemplates
        $templates = @()
        if ($ca.certificateTemplates) { $templates = @($ca.certificateTemplates) }
        if ($templates -notcontains "VulnUserAuth") {
          $templates += "VulnUserAuth"
          Set-ADObject -Identity $ca.DistinguishedName -Replace @{certificateTemplates=$templates}
        }
