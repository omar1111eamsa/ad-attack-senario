---
- name: Install AD CS on CA
  hosts: ca
  gather_facts: no
  tasks:
    - name: Install AD CS role
      ansible.windows.win_feature:
        name: ADCS-Cert-Authority
        state: present
        include_management_tools: true
      register: adcs_role

    - name: Reboot if AD CS role requires it
      ansible.windows.win_reboot:
        reboot_timeout: 1800
      when: adcs_role.reboot_required | default(false)

    - name: Configure Enterprise Root CA
      ansible.windows.win_shell: |
        Install-AdcsCertificationAuthority `
          -CAType EnterpriseRootCA `
          -CACommonName "{{ ca_common_name }}" `
          -CryptoProviderName 'RSA#Microsoft Software Key Storage Provider' `
          -KeyLength 2048 `
          -HashAlgorithmName SHA256 `
          -ValidityPeriod Years `
          -ValidityPeriodUnits 5 `
          -Force
      args:
        executable: powershell.exe
      register: ca_config
      failed_when: 
        - ca_config.rc != 0
        - "'already installed' not in ca_config.stderr"
        - "'The certification authority is already installed' not in ca_config.stdout"

      become: yes
      become_method: runas
      become_user: "{{ domain_user }}"

    - name: Trust the isolated lab subnet on the CA firewall
      ansible.windows.win_shell: |
        if (-not (Get-NetFirewallRule -DisplayName 'Lab-Allow-Subnet' -ErrorAction SilentlyContinue)) {
          New-NetFirewallRule -DisplayName 'Lab-Allow-Subnet' -Direction Inbound -Action Allow -RemoteAddress {{ lab_network }}.0/24 | Out-Null
          Write-Host 'CREATED'
        }
      args:
        executable: powershell.exe
      register: ca_fw
      changed_when: "'CREATED' in ca_fw.stdout"

    - name: Reboot after AD CS install
      ansible.windows.win_reboot:
        reboot_timeout: 1800

# The DC needs a Domain Controller / Kerberos Authentication certificate from the
# new Enterprise CA before it can validate PKINIT logons -- without it, certificate
# authentication (the ESC1 payoff) fails with KDC_ERROR_CLIENT_NOT_TRUSTED.
- name: Enroll DC certificates for PKINIT
  hosts: dc
  gather_facts: no
  become: yes
  become_method: runas
  become_user: "{{ domain_user }}"
  tasks:
    - name: Trigger certificate auto-enrollment on the DC
      ansible.windows.win_shell: |
        gpupdate /force | Out-Null
        certutil -pulse | Out-Null
        $auth = Get-ChildItem Cert:\LocalMachine\My | Where-Object {
          $_.EnhancedKeyUsageList.FriendlyName -match "Kerberos|Domain Controller|Smart Card Logon|Server Authentication"
        }
        Write-Host ("DC_AUTH_CERTS=" + ($auth | Measure-Object).Count)
      args:
        executable: powershell.exe
      register: dc_enroll
      retries: 10
      delay: 20
      until: "'DC_AUTH_CERTS=0' not in dc_enroll.stdout"
      changed_when: false
