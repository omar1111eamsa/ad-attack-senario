[defaults]
inventory = ./inventory.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
callbacks_enabled = profile_tasks
deprecation_warnings = False

# Configure more hosts in parallel (DC/CA/Win10/attacker run concurrently)
forks = 10

# Quiet the discovered-interpreter warning on the Kali host
interpreter_python = auto_silent

# Secrets live in group_vars/all/vault.yml (ansible-vault). Create .vault_pass
# with the vault password (see README) so playbooks decrypt unattended.
vault_password_file = ./.vault_pass
